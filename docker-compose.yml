services:
  app:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      HEADLESS: "true"
      CHROME_USER_DATA_DIR: /data/chrome-user-data
      GOOGLE_STORAGE_STATE_PATH: /data/auth/google-storage-state.json
    ports:
      - "${APP_BIND_ADDRESS:-0.0.0.0}:${APP_PORT:-3000}:3000"
    volumes:
      - chrome-profile-data:/data/chrome-user-data
      - auth-data:/data/auth

  auth-bootstrap:
    profiles: ["auth"]
    build:
      context: .
      target: auth-runtime
    environment:
      DISPLAY: :99
      SCREEN_GEOMETRY: 1920x1080x24
      VNC_PORT: 5900
      NOVNC_PORT: 6080
      GOOGLE_AUTH_HEADLESS: "false"
      GOOGLE_AUTH_TIMEOUT_MS: "${GOOGLE_AUTH_TIMEOUT_MS:-900000}"
      CHROME_USER_DATA_DIR: /data/chrome-user-data
      GOOGLE_STORAGE_STATE_PATH: /data/auth/google-storage-state.json
    ports:
      - "${AUTH_BOOTSTRAP_BIND_ADDRESS:-127.0.0.1}:${NOVNC_PORT:-6080}:6080"
    volumes:
      - chrome-profile-data:/data/chrome-user-data
      - auth-data:/data/auth

volumes:
  chrome-profile-data:
  auth-data:
